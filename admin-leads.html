<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead Management | Restu Harmoni</title>
<script src="supabase-config.js?v=v10.0-package-alignment"></script>
<script src="admin-auth.js?v=v10.0-package-alignment"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:#f8fafc;color:#0f172a}.top{position:sticky;top:0;z-index:10;background:#0f172a;color:#fff}.top .inner{width:min(1240px,94%);margin:auto;padding:16px 0;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.wrap{width:min(1240px,94%);margin:24px auto}.btn,button,select,input{border-radius:12px;padding:11px 14px;font-weight:850}.btn,button{border:0;background:#2563eb;color:#fff;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}.btn.dark{background:#334155}.btn.ghost,button.ghost{background:#e2e8f0;color:#0f172a}.bar{display:flex;gap:10px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:16px}.filters{display:flex;gap:8px;flex-wrap:wrap}select,input{border:1px solid #e2e8f0;background:#fff}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}.stat{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;box-shadow:0 12px 32px rgba(15,23,42,.05)}.stat span{color:#64748b}.stat b{font-size:28px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:16px;padding:14px;margin:14px 0;display:none}.ok{background:#ecfdf5;border-color:#bbf7d0;color:#166534}.table{background:#fff;border:1px solid #e2e8f0;border-radius:22px;overflow:auto;box-shadow:0 18px 48px rgba(15,23,42,.06)}table{width:100%;border-collapse:collapse;min-width:1180px}th,td{padding:13px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:top}th{background:#f1f5f9;font-size:13px;text-transform:uppercase;color:#475569}.pill{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;white-space:nowrap}.HOT{background:#fee2e2;color:#991b1b}.WARM{background:#fef3c7;color:#92400e}.COLD{background:#e0f2fe;color:#075985}.NEW{background:#dcfce7;color:#166534}.CONTACTED{background:#dbeafe;color:#1d4ed8}.QUOTATION_SENT{background:#fef3c7;color:#92400e}.WON{background:#dcfce7;color:#166534}.LOST{background:#fee2e2;color:#991b1b}.empty{text-align:center;padding:30px;color:#64748b}.answer-count{font-weight:900;color:#334155}.drawer{position:fixed;inset:0;z-index:40;display:none}.drawer.open{display:block}.shade{position:absolute;inset:0;background:rgba(15,23,42,.46)}.panel{position:absolute;right:0;top:0;height:100%;width:min(720px,96vw);background:#fff;box-shadow:-24px 0 60px rgba(15,23,42,.24);display:flex;flex-direction:column}.panel-head{padding:18px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.panel-body{padding:18px 20px;overflow:auto}.lead-title{font-size:22px;font-weight:950;margin:0}.meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:16px 0}.meta{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:12px}.meta small{display:block;color:#64748b;font-weight:800;margin-bottom:4px}.qa-list{display:grid;gap:10px;margin-top:12px}.qa{border:1px solid #e2e8f0;background:#fff;border-radius:16px;padding:13px}.qa .q{color:#475569;font-weight:900;font-size:13px}.qa .a{margin-top:5px;font-weight:850;color:#0f172a;white-space:pre-wrap}.notes{background:#fffbeb;border:1px solid #fde68a;border-radius:16px;padding:12px;color:#78350f;white-space:pre-wrap}.muted{color:#64748b}.mobile-card{display:none}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.table{display:none}.mobile-card{display:grid;gap:12px}.lead-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:14px;box-shadow:0 12px 32px rgba(15,23,42,.05)}.meta-grid{grid-template-columns:1fr}.panel{width:100vw}.filters>*{width:100%}}


/* RH Lead Management v10.0-package-alignment: no-overflow office polish */
html,body{max-width:100%;overflow-x:hidden!important;}
.top .inner,.wrap{width:calc(100% - 48px)!important;max-width:none!important;}
.table{max-width:100%;overflow:auto;border-radius:20px;}
table{min-width:980px;}
th,td{padding:12px 10px;word-break:break-word;}
.filters input{min-width:260px;}
.lead-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:15px;box-shadow:0 12px 32px rgba(15,23,42,.05)}
.lead-card .card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.lead-card strong{font-size:17px;}
.lead-card p{margin:8px 0;line-height:1.45;}
@media(max-width:1300px){
  .table{display:none!important;}
  .mobile-card{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
  .grid{grid-template-columns:repeat(4,minmax(0,1fr));}
}
@media(max-width:860px){
  .top .inner,.wrap{width:calc(100% - 28px)!important;}
  .mobile-card{grid-template-columns:1fr!important;}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .bar{display:block;}
  .filters{display:grid;grid-template-columns:1fr;}
  .filters input,.filters select,.filters button{width:100%;min-width:0;}
}
@media(max-width:520px){
  .top .inner{display:block;}
  .top .inner>div{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px;}
  .top .inner a,.top .inner button{width:100%;}
  .grid{grid-template-columns:1fr;}
}

</style>
</head>
<body>
<header class="top"><div class="inner"><strong>RH Lead Management</strong><div><a class="btn dark" href="admin.html">← Admin Panel</a><a class="btn dark" href="index.html">Website</a><button id="refreshTop">Refresh</button></div></div></header>
<main class="wrap">
<div class="bar"><div><h1>Leads Aira</h1><p style="color:#64748b;margin-top:-8px">Data lead + semua jawapan Aira dibaca daripada Supabase.</p></div><div class="filters"><input id="search" placeholder="Cari nama / telefon / jawapan"><select id="statusFilter"><option value="">Semua Status</option><option>NEW</option><option>CONTACTED</option><option>QUOTATION_SENT</option><option>WON</option><option>LOST</option></select><button id="refresh">Refresh</button></div></div>
<div id="notice" class="notice"></div>
<div class="grid"><div class="stat"><span>Total Leads</span><br><b id="total">0</b></div><div class="stat"><span>Hot Leads</span><br><b id="hot">0</b></div><div class="stat"><span>New</span><br><b id="new">0</b></div><div class="stat"><span>Won</span><br><b id="won">0</b></div></div>
<div class="table"><table><thead><tr><th>Tarikh</th><th>Nama</th><th>WhatsApp</th><th>Bisnes</th><th>Objektif</th><th>Budget</th><th>Timeline</th><th>Jawapan</th><th>Pakej</th><th>Score</th><th>Status</th><th>Action</th></tr></thead><tbody id="rows"><tr><td colspan="12" class="empty">Loading...</td></tr></tbody></table></div>
<div id="cards" class="mobile-card"></div>
</main>
<div id="drawer" class="drawer"><div class="shade" id="drawerShade"></div><aside class="panel"><div class="panel-head"><div><p class="lead-title" id="detailName">Lead</p><div class="muted" id="detailSub"></div></div><button class="ghost" id="drawerClose">Tutup</button></div><div class="panel-body" id="detailBody"></div></aside></div>
<script>
let allLeads=[],supa=null;
const esc=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function showNotice(msg,type){const n=document.getElementById('notice');n.textContent=msg;n.className='notice'+(type==='ok'?' ok':'');n.style.display='block'}
function hideNotice(){document.getElementById('notice').style.display='none'}
async function getClient(){if(supa)return supa;const auth=await window.RH_ADMIN_AUTH.requireAdmin();if(!auth)return null;supa=auth.client;return supa}
function getLeadAnswers(lead){
  const arr=lead._answers||lead.lead_answers||[];
  if(Array.isArray(arr)&&arr.length)return arr.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  return parseAnswersFromNotes(lead.notes||'');
}
function parseAnswersFromNotes(notes){
  const marker='Aira Answers: ';
  const idx=String(notes||'').indexOf(marker);
  if(idx<0)return [];
  return String(notes).slice(idx+marker.length).split(' | ').map((part,i)=>{const p=part.split(': ');return{question:p[0]||'Soalan',answer:p.slice(1).join(': ')||'',sort_order:i+1,question_key:'notes_'+i}}).filter(x=>x.answer);
}
async function loadLeads(){
  hideNotice();const client=await getClient();
  if(!client){allLeads=[];showNotice('Sila login sebagai admin.','err');render();return}
  const {data,error}=await client.from('leads').select('*').order('created_at',{ascending:false});
  if(error){allLeads=[];showNotice('Supabase read error: '+error.message+'.','err');render();return}
  allLeads=data||[];
  const ids=allLeads.map(x=>x.id).filter(Boolean);
  if(ids.length){
    const ans=await client.from('lead_answers').select('*').in('lead_id',ids).order('sort_order',{ascending:true});
    if(!ans.error){
      const grouped={};(ans.data||[]).forEach(a=>{(grouped[a.lead_id]||(grouped[a.lead_id]=[])).push(a)});
      allLeads=allLeads.map(l=>({...l,_answers:grouped[l.id]||[]}));
      showNotice('Connected. '+allLeads.length+' lead ditemui. Semua jawapan Aira berjaya dibaca.','ok');
    }else{
      showNotice('Lead dibaca, tetapi table lead_answers belum tersedia / belum ada policy. Jalankan supabase-aira-schema.sql versi baru. Fallback notes digunakan.','err');
    }
  }else showNotice('Connected. Tiada lead ditemui.','ok');
  render();
}
function filtered(){const s=document.getElementById('statusFilter').value,q=document.getElementById('search').value.trim().toLowerCase();return allLeads.filter(x=>{const answers=getLeadAnswers(x).map(a=>[a.question,a.answer].join(' ')).join(' ');const blob=[x.name,x.phone,x.business_type,x.objective,x.budget,x.timeline,x.recommended_package,x.status,x.notes,answers].join(' ').toLowerCase();return(!s||x.status===s)&&(!q||blob.includes(q))})}
function render(){
  const leads=filtered();document.getElementById('total').textContent=allLeads.length;document.getElementById('hot').textContent=allLeads.filter(x=>x.lead_temperature==='HOT').length;document.getElementById('new').textContent=allLeads.filter(x=>x.status==='NEW').length;document.getElementById('won').textContent=allLeads.filter(x=>x.status==='WON').length;
  const rows=document.getElementById('rows'),cards=document.getElementById('cards');
  if(!leads.length){rows.innerHTML='<tr><td colspan="12" class="empty">Tiada lead.</td></tr>';cards.innerHTML='<div class="empty">Tiada lead.</div>';return}
  rows.innerHTML=leads.map(x=>{const date=x.created_at?new Date(x.created_at).toLocaleString('ms-MY'):'-';const temp=x.lead_temperature||'WARM',status=x.status||'NEW';const ac=getLeadAnswers(x).length;return `<tr><td>${esc(date)}</td><td><strong>${esc(x.name)}</strong></td><td>${esc(x.phone)}</td><td>${esc(x.business_type)}</td><td>${esc(x.objective)}</td><td>${esc(x.budget)}</td><td>${esc(x.timeline)}</td><td><span class="answer-count">${ac}</span> item<br><button class="ghost detailBtn" data-id="${esc(x.id)}">Lihat Detail</button></td><td>${esc(x.recommended_package)}</td><td><span class="pill ${esc(temp)}">${esc(x.lead_score||0)}/100 ${esc(temp)}</span></td><td><span class="pill ${esc(status)}">${esc(status)}</span></td><td><select data-id="${esc(x.id)}" class="statusSelect">${['NEW','CONTACTED','QUOTATION_SENT','NEGOTIATION','WON','LOST'].map(st=>`<option ${st===status?'selected':''}>${st}</option>`).join('')}</select></td></tr>`}).join('');
  cards.innerHTML=leads.map(x=>{const date=x.created_at?new Date(x.created_at).toLocaleString('ms-MY'):'-';const temp=x.lead_temperature||'WARM',status=x.status||'NEW',ac=getLeadAnswers(x).length;return `<div class="lead-card"><strong>${esc(x.name||'Tanpa nama')}</strong><div class="muted">${esc(date)}</div><p>${esc(x.phone||'')}<br>${esc(x.business_type||'')} · ${esc(x.budget||'')}</p><p><span class="pill ${esc(temp)}">${esc(x.lead_score||0)}/100 ${esc(temp)}</span> <span class="pill ${esc(status)}">${esc(status)}</span></p><p class="answer-count">${ac} jawapan Aira direkodkan</p><button class="detailBtn" data-id="${esc(x.id)}">Lihat Detail</button></div>`}).join('');
  bindActions();
}
function bindActions(){
  document.querySelectorAll('.statusSelect').forEach(sel=>{sel.onchange=async()=>{const client=await getClient();if(!client)return;const {error}=await client.from('leads').update({status:sel.value}).eq('id',sel.dataset.id);if(error)showNotice('Update gagal: '+error.message,'err');else loadLeads()}});
  document.querySelectorAll('.detailBtn').forEach(btn=>{btn.onclick=()=>openDetail(btn.dataset.id)});
}
function openDetail(id){
  const lead=allLeads.find(x=>String(x.id)===String(id));if(!lead)return;
  const answers=getLeadAnswers(lead);document.getElementById('detailName').textContent=lead.name||'Lead Aira';document.getElementById('detailSub').textContent=[lead.phone,lead.business_type,lead.recommended_package].filter(Boolean).join(' · ');
  const date=lead.created_at?new Date(lead.created_at).toLocaleString('ms-MY'):'-';
  document.getElementById('detailBody').innerHTML=`<div class="meta-grid"><div class="meta"><small>Tarikh</small>${esc(date)}</div><div class="meta"><small>Status</small><span class="pill ${esc(lead.status||'NEW')}">${esc(lead.status||'NEW')}</span></div><div class="meta"><small>Score</small><span class="pill ${esc(lead.lead_temperature||'WARM')}">${esc(lead.lead_score||0)}/100 ${esc(lead.lead_temperature||'WARM')}</span></div><div class="meta"><small>Pakej Dicadang</small>${esc(lead.recommended_package||'-')}</div></div><h3>Soalan & Jawapan Aira</h3>${answers.length?`<div class="qa-list">${answers.map(a=>`<div class="qa"><div class="q">${esc(a.question||a.question_key)}</div><div class="a">${esc(a.answer)}</div></div>`).join('')}</div>`:'<p class="muted">Belum ada jawapan detail. Lead lama mungkin hanya ada notes.</p>'}<h3>Notes / Rekod Sistem</h3><div class="notes">${esc(lead.notes||'-')}</div><h3>Source</h3><p class="muted">${esc(lead.source||'-')}<br>${esc(lead.page_url||'')}</p>`;
  document.getElementById('drawer').classList.add('open');
}
document.getElementById('drawerClose').onclick=()=>document.getElementById('drawer').classList.remove('open');document.getElementById('drawerShade').onclick=()=>document.getElementById('drawer').classList.remove('open');document.getElementById('refresh').onclick=loadLeads;document.getElementById('refreshTop').onclick=loadLeads;document.getElementById('statusFilter').onchange=render;document.getElementById('search').oninput=render;loadLeads();
</script>
</body></html>
