<!doctype html>
<html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lead Management</title>
<script src="supabase-config.js"></script>
<script src="aira-lead-system.js"></script>
<style>
body{font-family:Inter,Arial;margin:0;background:#f8fafc}.top{background:#0f172a;color:#fff;padding:16px}
.wrap{width:min(1200px,95%);margin:20px auto}.btn{background:#2563eb;color:#fff;padding:10px 14px;border-radius:10px;text-decoration:none}
table{width:100%;background:#fff;border-collapse:collapse}th,td{padding:10px;border:1px solid #ddd}
</style></head><body>
<div class="top"><a class="btn" href="admin.html">← Admin Panel</a></div>
<div class="wrap">
<h1>Lead Management</h1>
<table><thead><tr><th>Nama</th><th>WhatsApp</th><th>Bisnes</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table>
</div>
<script>
(async()=>{
const rows=document.getElementById('rows');
if(!window.RH_AIRA_LEAD_SYSTEM){rows.innerHTML='<tr><td colspan=4>Lead system tidak dimuatkan</td></tr>';return;}
const client=await window.RH_AIRA_LEAD_SYSTEM.initSupabase();
if(!client){rows.innerHTML='<tr><td colspan=4>Supabase belum dikonfigurasi</td></tr>';return;}
const {data,error}=await client.from('leads').select('*').order('created_at',{ascending:false});
if(error){rows.innerHTML='<tr><td colspan=4>'+error.message+'</td></tr>';return;}
rows.innerHTML=(data||[]).map(x=>`<tr><td>${x.name||''}</td><td>${x.phone||''}</td><td>${x.business_type||''}</td><td>${x.status||''}</td></tr>`).join('');
})();
</script></body></html>
