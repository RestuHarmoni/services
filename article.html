<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel | Restu Harmoni</title><meta id="metaDesc" name="description" content="Artikel Restu Harmoni Digital Solutions"><style>
:root{--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:#f8fafc;color:var(--text)}.container{width:min(880px,92%);margin:auto}.nav{background:#fff;border-bottom:1px solid var(--line)}.nav .inner{height:72px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center;text-decoration:none;color:var(--text);font-weight:950}.brand img{width:42px}.btn{background:#0f172a;color:#fff;text-decoration:none;border-radius:999px;padding:11px 16px;font-weight:950}.hero{padding:50px 0 22px}.badge{display:inline-flex;background:#dbeafe;color:#1d4ed8;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:950}.hero h1{font-size:clamp(34px,6vw,62px);line-height:.98;letter-spacing:-.07em;margin:16px 0}.meta{color:var(--muted)}.sharebar{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0 0}.sharebar a,.sharebar button{border:0;border-radius:999px;padding:10px 14px;font-weight:950;text-decoration:none;cursor:pointer;background:#2563eb;color:#fff;font-size:14px}.sharebar .wa{background:#16a34a}.sharebar .copy{background:#0f172a}.sharebar .copied{background:#16a34a}.cover{width:100%;aspect-ratio:16/8;border-radius:30px;background:#dbeafe;margin:18px 0 28px;box-shadow:0 22px 70px rgba(15,23,42,.12);overflow:hidden;display:grid;place-items:center}.cover img{width:100%;height:100%;object-fit:cover;display:block}.cover.no-img:after{content:"RH";font-weight:950;color:#1d4ed8;font-size:28px}.article{background:#fff;border:1px solid var(--line);border-radius:30px;padding:clamp(22px,4vw,42px);box-shadow:0 18px 55px rgba(15,23,42,.06);font-size:18px;line-height:1.85}.article p{margin:0 0 18px}.article h2{font-size:30px;letter-spacing:-.04em;margin:32px 0 12px}.cta{margin:30px 0 60px;background:#0f172a;color:#fff;border-radius:28px;padding:26px;display:flex;justify-content:space-between;gap:16px;align-items:center}.cta p{color:#cbd5e1}.empty{margin:50px auto;background:#fff;border:1px dashed #cbd5e1;border-radius:24px;padding:28px;text-align:center;color:var(--muted)}@media(max-width:650px){.nav .inner{height:auto;padding:12px 0}.cta{display:block}.cta .btn{display:block;text-align:center;margin-top:16px}.article{font-size:16px}.cover{border-radius:22px}}
</style></head><body><nav class="nav"><div class="container inner"><a class="brand" href="index.html"><img src="assets/rh-logo.png" alt="Restu Harmoni"><span>RESTU HARMONI</span></a><a class="btn" href="blog.html">← Blog</a></div></nav><main class="container" id="app"><div class="empty">Memuatkan artikel...</div></main><script src="supabase-config.js?v=v9.0-production-cleanup"></script><script>
const slug=new URLSearchParams(location.search).get('slug');let client=null;function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function shareUrl(slug){return location.origin+'/blog/'+encodeURIComponent(slug)+'.html'}async function copyShareUrl(btn,url){try{await navigator.clipboard.writeText(url);btn.textContent='Link disalin';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Salin Link';btn.classList.remove('copied')},1800)}catch(e){prompt('Salin link artikel:',url)}}function formatContent(s){return String(s||'').split(/\n{2,}/).map(p=>{p=p.trim();if(!p)return'';if(p.startsWith('## '))return'<h2>'+esc(p.slice(3))+'</h2>';return'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>'}).join('')}async function load(){client=await window.RHGetSupabaseClient();if(!client){document.getElementById('app').innerHTML='<div class="empty">Artikel belum boleh dibaca. Supabase belum dikonfigurasi.</div>';return;}if(!slug){document.getElementById('app').innerHTML='<div class="empty">Slug artikel tidak dijumpai.</div>';return;}const {data,error}=await client.from('blog_posts').select('*').eq('slug',slug).eq('status','published').maybeSingle();if(error||!data){document.getElementById('app').innerHTML='<div class="empty">Artikel belum published atau tidak dijumpai.</div>';return;}document.title=(data.meta_title||data.title)+' | Restu Harmoni';document.getElementById('metaDesc').setAttribute('content',data.meta_description||'Artikel Restu Harmoni');const cover=String(data.cover_image||'').trim()?`<div class="cover"><img src="${esc(data.cover_image)}" alt="Gambar artikel" onerror="this.style.display='none';this.parentElement.classList.add('no-img')"></div>`:'<div class="cover no-img"></div>';document.getElementById('app').innerHTML=`<section class="hero"><span class="badge">${esc(data.category||'SEO')}</span><h1>${esc(data.title)}</h1><div class="meta">Diterbitkan oleh Restu Harmoni Digital Solutions</div><div class="sharebar"><a target="_blank" rel="noopener" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl(data.slug))}">Share Facebook</a><a class="wa" target="_blank" rel="noopener" href="https://wa.me/?text=${encodeURIComponent(data.title+' '+shareUrl(data.slug))}">WhatsApp</a><button class="copy" type="button" onclick="copyShareUrl(this, '${shareUrl(data.slug)}')">Salin Link</button></div></section>${cover}<article class="article">${formatContent(data.content)}</article><section class="cta"><div><h2>Nak website untuk bisnes anda?</h2><p>Restu Harmoni bantu bina website yang kemas, mobile friendly dan mudah pelanggan hubungi melalui WhatsApp.</p></div><a class="btn" href="index.html#aira-popup">Dapatkan Cadangan Website</a></section>`}load();
</script></body></html>
