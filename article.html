<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Artikel | Restu Harmoni</title><meta id="metaDesc" name="description" content="Artikel Restu Harmoni Digital Solutions"><style>
:root{--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--gold:#d99a1e;--dark:#0f172a}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:linear-gradient(180deg,#eff6ff,#fff 35%,#f8fafc);color:var(--text);overflow-x:hidden}.bgfx{position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(circle at 12% 20%,rgba(37,99,235,.14),transparent 28%),radial-gradient(circle at 90% 16%,rgba(217,154,30,.14),transparent 22%),linear-gradient(rgba(37,99,235,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.035) 1px,transparent 1px);background-size:auto,auto,58px 58px,58px 58px}.bgfx:before,.bgfx:after{content:"";position:absolute;width:390px;height:390px;border-radius:999px;filter:blur(62px);opacity:.35;animation:floatGlow 17s ease-in-out infinite alternate}.bgfx:before{left:-110px;top:260px;background:rgba(37,99,235,.26)}.bgfx:after{right:-140px;top:440px;background:rgba(217,154,30,.22);animation-duration:21s}@keyframes floatGlow{from{transform:translate3d(0,0,0) scale(1)}to{transform:translate3d(46px,-34px,0) scale(1.08)}}.progress{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,#2563eb,#38bdf8,#d99a1e);width:0;z-index:40}.container{width:min(1120px,92%);margin:auto}.nav{background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}.nav .inner{height:72px;display:flex;justify-content:space-between;align-items:center;gap:16px}.brand{display:flex;gap:10px;align-items:center;text-decoration:none;color:var(--text);font-weight:950;line-height:1.1}.brand img{width:42px}.btn{background:#0f172a;color:#fff;text-decoration:none;border-radius:999px;padding:11px 16px;font-weight:950;display:inline-flex;align-items:center;justify-content:center}.article-shell{display:grid;grid-template-columns:minmax(0,760px) 300px;gap:30px;align-items:start;padding-bottom:70px}.hero{padding:54px 0 24px}.badge{display:inline-flex;background:#dbeafe;color:#1d4ed8;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:950}.hero h1{font-size:clamp(36px,6vw,68px);line-height:.96;letter-spacing:-.07em;margin:18px 0}.desc{font-size:19px;line-height:1.7;color:#334155}.meta{color:var(--muted);font-size:14px;font-weight:750;display:flex;gap:12px;flex-wrap:wrap}.sharebar{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0 0}.sharebar a,.sharebar button{border:0;border-radius:999px;padding:11px 15px;font-weight:950;text-decoration:none;cursor:pointer;background:#2563eb;color:#fff;font-size:14px}.sharebar .wa{background:#16a34a}.sharebar .copy{background:#0f172a}.sharebar .copied{background:#16a34a}.cover{width:100%;aspect-ratio:1200/630;border-radius:32px;background:#dbeafe;margin:18px 0 28px;box-shadow:0 24px 76px rgba(15,23,42,.12);overflow:hidden;border:1px solid var(--line);display:grid;place-items:center}.cover img{width:100%;height:100%;object-fit:cover;display:block}.cover.no-img:after{content:"RH";font-weight:950;color:#1d4ed8;font-size:28px}.article{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:32px;padding:clamp(24px,4vw,46px);box-shadow:0 20px 66px rgba(15,23,42,.07);font-size:18px;line-height:1.88}.article p{margin:0 0 19px}.article h2{font-size:32px;letter-spacing:-.045em;margin:36px 0 14px;line-height:1.08}.article a{color:#2563eb;font-weight:850}.toc{position:sticky;top:96px;display:grid;gap:16px}.toc-card,.related-card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:26px;padding:20px;box-shadow:0 16px 54px rgba(15,23,42,.06)}.toc h3,.related-card h3{margin:0 0 14px;font-size:20px;letter-spacing:-.035em}.toc a{display:block;text-decoration:none;color:#334155;font-weight:850;border-top:1px solid #eef2f7;padding:10px 0;line-height:1.25}.toc .small{color:var(--muted);font-size:13px;line-height:1.65}.cta{margin:30px 0;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;border-radius:30px;padding:28px;display:flex;justify-content:space-between;gap:18px;align-items:center;box-shadow:0 18px 60px rgba(15,23,42,.16)}.cta p{color:#dbeafe}.cta .btn{background:#fbbf24;color:#111827;white-space:nowrap}.related{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:28px 0 70px}.rel{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;text-decoration:none;color:var(--text);box-shadow:0 14px 44px rgba(15,23,42,.06)}.rel img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#dbeafe;display:block}.rel div{padding:14px}.rel strong{display:block;line-height:1.18}.rel span{display:block;color:var(--muted);font-size:12px;margin-top:8px}.empty{margin:50px auto;background:#fff;border:1px dashed #cbd5e1;border-radius:24px;padding:28px;text-align:center;color:var(--muted)}@media(max-width:980px){.article-shell{grid-template-columns:1fr}.toc{position:static;order:2}.related{grid-template-columns:1fr}.cta{display:block}.cta .btn{margin-top:14px}.nav .inner{height:auto;padding:12px 0}}@media(max-width:650px){.article{font-size:16.5px}.cover{border-radius:22px}.hero{padding:38px 0 20px}.brand span{font-size:14px}.btn{padding:10px 13px}.bgfx:before,.bgfx:after{width:300px;height:300px}}</style></head><body><div class="progress" id="progress"></div><div class="bgfx"></div><nav class="nav"><div class="container inner"><a class="brand" href="index.html"><img src="assets/rh-logo.png" alt="Restu Harmoni"><span>RESTU HARMONI<br><small>Digital Solutions</small></span></a><a class="btn" href="blog.html">← Blog</a></div></nav><main class="container" id="app"><div class="empty">Memuatkan artikel...</div></main><script src="supabase-config.js?v=v12.0-sales-workspace"></script><script>
const qs=new URLSearchParams(location.search);const pathSlug=(location.pathname.match(/\/blog\/([^/?#]+)\.html$/)||[])[1];const slug=qs.get('slug')||pathSlug;let client=null;function esc(s){return String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}function shareUrl(slug){return location.origin+'/blog/'+encodeURIComponent(slug)+'.html'}function readMins(content){const words=String(content||'').split(/\s+/).filter(Boolean).length;return Math.max(2,Math.ceil(words/180))}function fmtDate(d){return d?new Date(d).toLocaleDateString('ms-MY',{day:'numeric',month:'short',year:'numeric'}):'Artikel RH'}async function copyShareUrl(btn,url){try{await navigator.clipboard.writeText(url);btn.textContent='Link disalin';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Salin Link';btn.classList.remove('copied')},1800)}catch(e){prompt('Salin link artikel:',url)}}function slugifyHeading(t,i){return 'section-'+i+'-'+String(t||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,48)}function formatContent(s){let i=0;return String(s||'').split(/\n{2,}/).map(p=>{p=p.trim();if(!p)return'';if(p.startsWith('## ')){const title=p.slice(3);const id=slugifyHeading(title,++i);return'<h2 id="'+id+'">'+esc(title)+'</h2>';}return'<p>'+esc(p).replace(/\n/g,'<br>')+'</p>'}).join('')}function toc(content){let i=0;const headings=String(content||'').split(/\n{2,}/).map(x=>x.trim()).filter(x=>x.startsWith('## ')).map(x=>{const t=x.slice(3);return{id:slugifyHeading(t,++i),title:t}}).slice(0,8);return headings.length?headings.map(h=>`<a href="#${h.id}">${esc(h.title)}</a>`).join(''):'<p class="small">Artikel ini direka sebagai bacaan ringkas. Teruskan baca dan klik artikel berkaitan selepas selesai.</p>'}function formatCover(url){return String(url||'').trim()?`<div class="cover"><img src="${esc(url)}" alt="Gambar artikel" onerror="this.style.display='none';this.parentElement.classList.add('no-img')"></div>`:'<div class="cover no-img"></div>'}function relatedCard(p){return `<a class="rel" href="blog/${encodeURIComponent(p.slug)}.html"><img src="${esc(p.cover_image||'assets/rh-logo.png')}" alt=""><div><strong>${esc(p.title)}</strong><span>${esc(p.category||'SEO')} • ${readMins(p.content||p.meta_description)} min</span></div></a>`}async function load(){client=await window.RHGetSupabaseClient();if(!client){document.getElementById('app').innerHTML='<div class="empty">Artikel belum boleh dibaca. Supabase belum dikonfigurasi.</div>';return;}if(!slug){document.getElementById('app').innerHTML='<div class="empty">Slug artikel tidak dijumpai.</div>';return;}const {data,error}=await client.from('blog_posts').select('*').eq('slug',slug).eq('status','published').maybeSingle();if(error||!data){document.getElementById('app').innerHTML='<div class="empty">Artikel belum published atau tidak dijumpai.</div>';return;}document.title=(data.meta_title||data.title)+' | Restu Harmoni';document.getElementById('metaDesc').setAttribute('content',data.meta_description||'Artikel Restu Harmoni');const url=shareUrl(data.slug);let related=[];try{const res=await client.from('blog_posts').select('title,slug,category,cover_image,meta_description,content,published_at').eq('status','published').neq('slug',data.slug).limit(3);related=res.data||[]}catch(e){}document.getElementById('app').innerHTML=`<section class="hero"><span class="badge">${esc(data.category||'SEO')}</span><h1>${esc(data.title)}</h1><p class="desc">${esc(data.meta_description||data.excerpt||'Artikel Restu Harmoni Digital Solutions.')}</p><div class="meta"><span>${fmtDate(data.published_at)}</span><span>•</span><span>${readMins(data.content)} min baca</span><span>•</span><span>Restu Harmoni Digital Solutions</span></div><div class="sharebar"><a target="_blank" rel="noopener" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}">Share Facebook</a><a class="wa" target="_blank" rel="noopener" href="https://wa.me/?text=${encodeURIComponent(data.title+' '+url)}">WhatsApp</a><button class="copy" type="button" onclick="copyShareUrl(this, '${url}')">Salin Link</button></div></section>${formatCover(data.cover_image)}<div class="article-shell"><div><article class="article">${formatContent(data.content)}</article><section class="cta"><div><h2>Nak website untuk bisnes anda?</h2><p>Aira boleh cadangkan pakej website berdasarkan jenis bisnes, bajet dan objektif anda.</p></div><a class="btn" href="index.html#aira-popup">Tanya Aira</a></section>${related.length?`<h2>Artikel Berkaitan</h2><div class="related">${related.map(relatedCard).join('')}</div>`:''}</div><aside class="toc"><div class="toc-card"><h3>Isi Kandungan</h3>${toc(data.content)}</div><div class="related-card"><h3>Perlu bantuan?</h3><p class="small">Klik Aira untuk semak pakej website yang sesuai dengan bisnes anda.</p><a class="btn" href="index.html#aira-popup">Buka Aira</a></div></aside></div>`}load();window.addEventListener('scroll',()=>{const h=document.documentElement;const max=h.scrollHeight-h.clientHeight;document.getElementById('progress').style.width=(max?Math.min(100,(h.scrollTop/max)*100):0)+'%'});
</script></body></html>
