<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login | Restu Harmoni</title>
<script src="supabase-config.js?v=v12.0-sales-workspace"></script>
<script src="admin-auth.js?v=v12.0-sales-workspace"></script>
<style>
body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(135deg,#0f172a,#1d4ed8);min-height:100vh;display:grid;place-items:center;color:#0f172a}.card{width:min(420px,92%);background:#fff;border-radius:28px;padding:28px;box-shadow:0 28px 90px rgba(0,0,0,.3)}h1{margin:0 0 10px;font-size:34px;letter-spacing:-.05em}p{color:#64748b;line-height:1.55}input,button{width:100%;padding:15px;border-radius:16px;border:1px solid #e2e8f0;font-size:16px;margin-top:10px}button{background:#2563eb;color:#fff;font-weight:900;cursor:pointer}.err{color:#dc2626;font-weight:800;margin-top:10px;min-height:20px}.note{font-size:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px;margin-top:14px}
</style>
</head>
<body>
<div class="card">
<h1>Admin Restu Harmoni</h1>
<p>Login menggunakan akaun admin Supabase Auth yang telah didaftarkan dalam table <strong>admin_users</strong>.</p>
<input id="email" placeholder="Email admin" type="email" autocomplete="username">
<input id="pass" placeholder="Password" type="password" autocomplete="current-password">
<button id="login">Login</button>
<div class="err" id="err"></div>
<p class="note">Nota: Login hardcoded lama telah dibuang untuk keselamatan.</p>
</div>
<script>
async function login(){
 const email=document.getElementById('email').value.trim();
 const password=document.getElementById('pass').value;
 const err=document.getElementById('err');
 err.textContent='';
 if(!email||!password){err.textContent='Masukkan email dan password.';return;}
 try{
  const c=await window.RH_ADMIN_AUTH.getClient();
  const {data,error}=await c.auth.signInWithPassword({email,password});
  if(error)throw error;
  const {data:admin,error:adminErr}=await c.from('admin_users').select('user_id,is_active').eq('user_id',data.user.id).eq('is_active',true).maybeSingle();
  if(adminErr||!admin){await c.auth.signOut();err.textContent='Akaun ini bukan admin aktif.';return;}
  location.href='admin.html';
 }catch(e){err.textContent=e.message||'Login gagal.';}
}
document.getElementById('login').onclick=login;
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body></html>
