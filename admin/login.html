<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login | Restu Harmoni</title>
  <link rel="stylesheet" href="assets/admin.css">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#071a2d"></head>
<body class="auth-page">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <img src="../assets/rh-logo.png" alt="Restu Harmoni">
        <div>
          <strong>RH Admin V1</strong>
          <span>Command Center</span>
        </div>
      </div>
      <h1>Staff Login</h1>
      <p>Masuk menggunakan Staff ID yang dicipta oleh Super Admin.</p>
      <form id="loginForm" class="form-stack" autocomplete="on" novalidate>
        <label>Staff ID
          <input id="staffId" autocomplete="username" placeholder="SUPER001" required>
        </label>
        <label>Password
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
        </label>
        <button type="button" id="loginButton" class="primary-btn">Login</button>
      </form>
      <div id="loginMessage" class="form-message"></div>
      <div class="login-note">Beta setup: jalankan SQL admin dahulu sebelum login.</div>
    </section>
  </main>
  <script src="../supabase-config.js"></script>
  <script src="assets/admin.js?v=delete-engine-v1-20260615"></script>
</body>
</html>
